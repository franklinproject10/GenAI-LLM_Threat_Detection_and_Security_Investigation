title: AI Service Account Used From Unexpected Address or Client
id: 2b8c1f10-0511-4a01-b002-a1a220260511
status: experimental
description: Detects use of an AI platform service account from outside the corporate network or with a user agent other than the official client.
references:
    - https://atlas.mitre.org/techniques/AML.T0012
    - https://attack.mitre.org/techniques/T1078/
author: Frank, CentralReach SOC
date: 2026-05-12
tags:
    - attack.initial-access
    - attack.t1078
logsource:
    product: ai_assistant
    service: api_access
detection:
    selection_sa:
        service_account:
            - 'rag-prod'
            - 'vector-reader'
            - 'ai-assistant-api'
    filter_known_good:
        source_ip|startswith: '10.'
        user_agent|startswith: 'ai-assistant/'
    condition: selection_sa and not filter_known_good
falsepositives:
    - New legitimate workload hosts or an updated official client
level: high
fields:
    - service_account
    - source_ip
    - user_agent
    - tokens_used
